<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClAudio — Assistente de Voz</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Sora:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="s-idle">

  <div class="unsupported" id="unsupported">⚠ Navegador não suporta reconhecimento de voz. Use Chrome ou Edge.</div>

  <div class="close-btn" onclick="if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'close_widget'}))">X</div>

  <div class="top-panel">
    <div class="ws-status">
      <div class="dot" id="wsDot"></div><span id="wsLabel">desconectado</span>
    </div>
    <div class="quota-info" id="quotaWrap" style="opacity: 0;">
      Interações: <span id="quotaCount">0</span>
      <div class="quota-timer" id="quotaTimer">Reset: --:--</div>
    </div>
  </div>

  <div class="container">
    <div class="core-wrap" id="coreWrap" title="Clique para falar ou diga 'Cláudio'">
      <div class="core-ring r1"></div>
      <div class="core-ring r2"></div>
      <div class="core-ring r3"></div>
      <div class="core-dot"></div>
    </div>

    <div class="status-wrap">
      <div class="status-badge" id="badge">Aguardando</div>
      <div class="transcript" id="transcript"></div>
    </div>
  </div>

  <div class="history" id="history"></div>
  <div class="hint" id="hint">Diga "Cláudio" para iniciar</div>

  <script src="main.js"></script>
</body>

</html>

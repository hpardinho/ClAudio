<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClAudio — Assistente de Voz</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Sora:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b0c;
      --border: rgba(255, 255, 255, 0.12);
      --border-hl: rgba(255, 255, 255, 0.35);
      --text: #ffffff;
      --muted: #a1a1aa;
      --accent: #ffffff;
      --danger: #ff8a9f;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Sora', sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      gap: 32px;
    }

    .top-panel {
      position: fixed;
      top: 18px;
      right: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      z-index: 10;
      cursor: default;
    }

    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
    }

    .dot.connected {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .dot.error {
      background: var(--danger);
    }

    .quota-info {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      backdrop-filter: blur(4px);
      text-align: right;
      transition: opacity 0.3s;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
    }

    .quota-info span {
      color: var(--text);
      font-weight: 400;
    }

    .quota-timer {
      margin-top: 4px;
      font-size: 9px;
      opacity: 0.6;
    }

    .close-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 100;
      font-family: 'DM Mono', monospace;
    }

    .close-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(207, 102, 121, 0.05);
      transform: scale(1.05);
    }

    .core-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
    }

    .core-wrap:hover {
      transform: scale(1.02);
    }

    .core-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--border);
      transition: all 0.5s ease;
      opacity: 0.5;
    }

    .r1 {
      width: 60px;
      height: 60px;
    }

    .r2 {
      width: 90px;
      height: 90px;
      border-style: dashed;
      opacity: 0.3;
    }

    .r3 {
      width: 120px;
      height: 120px;
    }

    .core-dot {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      transition: all 0.4s ease;
      z-index: 2;
    }

    /* States Automation CSS */
    .s-idle .r2 {
      animation: rotate 20s linear infinite;
    }

    .s-wake .core-dot {
      background: var(--accent);
      transform: scale(1.5);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    .s-wake .r1 {
      transform: scale(1.1);
      border-color: var(--border-hl);
    }

    .s-listening .core-dot {
      background: var(--accent);
      animation: pulse 1.2s infinite alternate ease-in-out;
    }

    .s-listening .core-ring {
      border-color: rgba(255, 255, 255, 0.1);
    }

    .s-listening .r2 {
      animation: rotate 8s linear infinite reverse;
    }

    .s-thinking .core-dot {
      background: #999;
      animation: blink 1s infinite;
    }

    .s-speaking .core-dot {
      background: var(--text);
    }

    .s-speaking .r1 {
      animation: soundwave 1s infinite alternate ease-in-out;
      border-color: var(--border-hl);
    }

    .s-speaking .r3 {
      animation: soundwave 1s infinite alternate-reverse ease-in-out;
      opacity: 0.8;
    }

    .s-error .core-dot {
      background: var(--danger);
      box-shadow: 0 0 10px rgba(207, 102, 121, 0.3);
    }

    @keyframes rotate {
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      from {
        opacity: 0.5;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1.6);
      }
    }

    @keyframes soundwave {
      from {
        transform: scale(0.95);
      }

      to {
        transform: scale(1.15);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.2;
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      width: 100%;
    }

    .status-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all 0.4s ease;
      background: rgba(255, 255, 255, 0.01);
    }

    .status-badge.active {
      color: var(--text);
      border-color: var(--border-hl);
    }

    .transcript {
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
      max-width: 85%;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      min-height: 18px;
    }

    .transcript.show {
      opacity: 1;
      transform: translateY(0);
      color: var(--text);
    }

    .history {
      width: 100%;
      max-width: 400px;
      height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 20px 20px 20px;
      scrollbar-width: none;
    }

    .history::-webkit-scrollbar {
      display: none;
    }

    .msg {
      font-size: 11px;
      font-weight: 300;
      line-height: 1.6;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      max-width: 90%;
      animation: slideup 0.4s ease forwards;
      opacity: 0;
      transform: translateY(8px);
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: transparent;
      color: #dfdfdf;
      border-style: dashed;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .msg.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      color: var(--text);
    }

    @keyframes slideup {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0.5;
      position: absolute;
      bottom: 20px;
      transition: opacity 0.3s;
    }

    .hint.hidden {
      opacity: 0;
    }

    .unsupported {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(207, 102, 121, 0.1);
      border-bottom: 1px solid var(--danger);
      color: var(--danger);
      font-size: 11px;
      text-align: center;
      padding: 8px;
      font-family: 'DM Mono', monospace;
      z-index: 1000;
      display: none;
    }
  </style>
</head>

<body class="s-idle">

  <div class="unsupported" id="unsupported">⚠ Navegador não suporta reconhecimento de voz. Use Chrome ou Edge.</div>

  <div class="close-btn" onclick="if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'close_widget'}))">X</div>

  <div class="top-panel">
    <div class="ws-status">
      <div class="dot" id="wsDot"></div><span id="wsLabel">desconectado</span>
    </div>
    <div class="quota-info" id="quotaWrap" style="opacity: 0;">
      Interações: <span id="quotaCount">0</span>
      <div class="quota-timer" id="quotaTimer">Reset: --:--</div>
    </div>
  </div>

  <div class="container">
    <div class="core-wrap" id="coreWrap" title="Clique para falar ou diga 'Cláudio'">
      <div class="core-ring r1"></div>
      <div class="core-ring r2"></div>
      <div class="core-ring r3"></div>
      <div class="core-dot"></div>
    </div>

    <div class="status-wrap">
      <div class="status-badge" id="badge">Aguardando</div>
      <div class="transcript" id="transcript"></div>
    </div>
  </div>

  <div class="history" id="history"></div>
  <div class="hint" id="hint">Diga "Cláudio" para iniciar</div>

  <script>
    // --- Sec-UX (Anti-Inspecionar Global) ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['i', 'I', 'j', 'J', 'c', 'C'].includes(e.key)) || (e.ctrlKey && ['u', 'U'].includes(e.key))) {
        e.preventDefault(); return false;
      }
    });

    // --- Arraste de Janela Nativo (Drag Fallback) ---
    document.body.addEventListener('mousedown', (e) => {
      if (!e.target.closest('.close-btn') && !e.target.closest('#coreWrap') && !e.target.closest('.msg')) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'drag_window' }));
        }
      }
    });

    // ── Gestão de Estados e UI Avançada ─────────────────────────────────
    let state = 'idle';
    const badgeEl = document.getElementById('badge');
    const hintEl = document.getElementById('hint');

    function applyState(s) {
      state = s;
      document.body.className = 's-' + s; // Liga o CSS Monocromatico respectivo

      let t = '';
      let active = false;
      if (s === 'idle') { t = 'aguardando'; }
      else if (s === 'listening') { t = 'ouvindo'; active = true; }
      else if (s === 'thinking') { t = 'pensando'; active = true; }
      else if (s === 'speaking') { t = 'respondendo'; active = true; }
      else if (s === 'wake') { t = 'oi!'; active = true; }
      else if (s === 'error') { t = 'erro'; }

      badgeEl.textContent = t;
      badgeEl.className = 'status-badge' + (active ? ' active' : '');
      hintEl.className = s === 'idle' ? 'hint' : 'hint hidden';
    }
    applyState('idle');

    // ── Wake Word + Speech Recognition (LÓGICA BLINDADA DO USUÁRIO) ────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let hasSent = false;
    let listenMode = 'off';

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    }

    function containsWakeWord(text) {
      return normalize(text).includes('claudio');
    }

    function extractQuestion(text) {
      const norm = normalize(text);
      const idx = norm.indexOf('claudio');
      if (idx === -1) return text.trim();
      return text.substring(idx + 7).replace(/^[,!?\s]+/, '').trim();
    }

    function startPassiveListening() {
      if (!recognition || state === 'thinking' || state === 'speaking') return;
      listenMode = 'passive';
      hasSent = false;
      recognition.continuous = true;
      recognition.interimResults = true;
      try { recognition.start(); } catch (e) { }
    }

    if (!SpeechRecognition) {
      document.getElementById('unsupported').style.display = 'block';
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';

      recognition.onstart = () => {
        if (listenMode === 'active') applyState('listening');
      };

      recognition.onresult = (event) => {
        let interim = '', finalText = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const txt = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalText += txt;
          else interim += txt;
        }
        const currentText = finalText || interim;

        if (listenMode === 'passive') {
          if (containsWakeWord(currentText)) {
            listenMode = 'active';
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'wake_word' }));
            applyState('wake');
            showTranscript('Pode falar...');
            if (finalText) {
              const q = extractQuestion(finalText);
              if (q.length > 2) {
                hasSent = true; listenMode = 'off';
                recognition.stop();
                const qClean = q.toLowerCase().replace(/[^a-z0-9áéíóúâêîôûãõç]/g, '');
                if (qClean === 'cancelar' || qClean === 'cancela') {
                  showTranscript('Solicitação cancelada.');
                  applyState('speaking');
                  speakText('Solicitação cancelada.');
                  return;
                }
                sendToBackend(q);
                return;
              }
              applyState('listening');
            }
          }
          return;
        }

        if (listenMode === 'active') {
          showTranscript(currentText);
          if (finalText && !hasSent) {
            const q = extractQuestion(finalText);
            if (q.length <= 2) return;

            hasSent = true; listenMode = 'off';
            recognition.stop();

            const qClean = q.toLowerCase().replace(/[^a-z0-9áéíóúâêîôûãõç]/g, '');
            if (qClean === 'cancelar' || qClean === 'cancela') {
              showTranscript('Solicitação cancelada.');
              applyState('speaking');
              speakText('Solicitação cancelada.');
              return;
            }
            sendToBackend(q);
          }
        }
      };

      recognition.onerror = (event) => {
        if (event.error === 'no-speech' && listenMode === 'active') {
          showTranscript('Não ouvi nada. Diga "Ei, Cláudio".');
        }
        setTimeout(() => { if (listenMode !== 'off') startPassiveListening(); }, 1000);
      };

      recognition.onend = () => {
        if (listenMode === 'active' && !hasSent) {
          applyState('idle');
          setTimeout(startPassiveListening, 500);
        } else if (listenMode === 'passive') {
          setTimeout(startPassiveListening, 500);
        }
      };
    }

    // ── TTS Otimizado ────────────────────────────────────────────────────
    let bestVoice = null;
    let ttsReady = false;
    let speakTimeout = null;

    function findBestVoice() {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return null;
      const priorities = [
        v => v.name.includes('Online') && v.lang.startsWith('pt-BR'),
        v => v.name.includes('Natural') && v.lang.startsWith('pt-BR'),
        v => v.name.includes('Online') && v.lang.startsWith('pt'),
        v => v.name.includes('Francisca') || v.name.includes('Antonio'),
        v => v.lang === 'pt-BR',
        v => v.lang.startsWith('pt'),
      ];
      for (const test of priorities) {
        const found = voices.find(test);
        if (found) return found;
      }
      return null;
    }

    function warmUpTTS() {
      if (!('speechSynthesis' in window) || ttsReady) return;
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0;
      warm.onend = () => { ttsReady = true; };
      speechSynthesis.speak(warm);
    }

    function recoverFromSpeech() {
      clearTimeout(speakTimeout);
      speakTimeout = null;
      applyState('idle');
      setTimeout(startPassiveListening, 600);
    }

    function speakText(text) {
      if (!('speechSynthesis' in window)) { recoverFromSpeech(); return; }

      const now = Date.now();
      const lastSpoke = parseInt(localStorage.getItem('claudio_last_spoke') || '0');
      if (now - lastSpoke < 500) { recoverFromSpeech(); return; }
      localStorage.setItem('claudio_last_spoke', now.toString());

      if (recognition) try { recognition.stop(); } catch (e) { }
      listenMode = 'off';
      speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR'; u.rate = 1.0; u.pitch = 1.0;
      if (bestVoice) u.voice = bestVoice;

      u.onend = () => recoverFromSpeech();
      u.onerror = () => recoverFromSpeech();

      const estimatedMs = Math.max(text.length * 80, 4000) + 4000;
      clearTimeout(speakTimeout);
      speakTimeout = setTimeout(() => {
        speechSynthesis.cancel();
        recoverFromSpeech();
      }, estimatedMs);
      speechSynthesis.speak(u);
    }

    if ('speechSynthesis' in window) {
      const lv = () => { bestVoice = findBestVoice(); warmUpTTS(); };
      speechSynthesis.onvoiceschanged = lv;
      lv();
      setTimeout(warmUpTTS, 1000);
    }

    // ── Clicks & Backend Interop ───────────────────────────────────
    document.getElementById('coreWrap').onclick = () => {
      if (!recognition || state === 'thinking') return;
      if (state === 'speaking') {
        if ('speechSynthesis' in window) speechSynthesis.cancel();
        applyState('idle'); setTimeout(startPassiveListening, 300);
        return;
      }
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        applyState('error'); showTranscript('Servidor não conectado.');
        setTimeout(() => applyState('idle'), 2000); return;
      }
      if (listenMode === 'passive') { try { recognition.stop(); } catch (e) { } }
      setTimeout(() => {
        listenMode = 'active'; hasSent = false;
        recognition.continuous = false; recognition.interimResults = true;
        try { recognition.start(); } catch (e) { }
      }, 250);
    };

    function sendToBackend(text) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      applyState('thinking'); showTranscript(text);
      ws.send(JSON.stringify({ type: 'user_message', text: text }));
    }

    function showTranscript(text) {
      const tr = document.getElementById('transcript');
      tr.textContent = text;
      if (text) { tr.classList.add('show'); }
      else { tr.classList.remove('show'); }
    }

    function addHistory(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      const hist = document.getElementById('history');
      hist.appendChild(div);
      hist.scrollTop = hist.scrollHeight;
      while (hist.children.length > 20) hist.removeChild(hist.firstChild);
    }

    // ── Timer de Reset ───────────────────────────────────
    let resetTimerInterval;
    function startResetTimer() {
      if (resetTimerInterval) clearInterval(resetTimerInterval);
      const timerEl = document.getElementById('quotaTimer');

      function updateTimer() {
        const now = new Date();
        const target = new Date(now);
        target.setHours(5, 0, 0, 0);
        if (now.getHours() >= 5) target.setDate(target.getDate() + 1);
        const diffMs = target - now;
        const h = Math.floor(diffMs / 3600000);
        const m = Math.floor((diffMs % 3600000) / 60000);
        timerEl.textContent = `Reset em: ${h.toString().padStart(2, '0')}h${m.toString().padStart(2, '0')}`;
      }
      updateTimer();
      resetTimerInterval = setInterval(updateTimer, 60000); // 1 minuto update visual
    }

    // ── WebSocket Connect ──────────────────────────────────────────────
    let ws;
    const wsDot = document.getElementById('wsDot');
    const wsLabel = document.getElementById('wsLabel');
    const quotaWrap = document.getElementById('quotaWrap');
    const quotaCount = document.getElementById('quotaCount');

    function connectWS() {
      try {
        ws = new WebSocket('ws://localhost:8765');
        ws.onopen = () => {
          wsDot.className = 'dot connected'; wsLabel.textContent = 'conectado';
          setTimeout(startPassiveListening, 500);
          startResetTimer();
        };
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.state) {
            applyState(data.state);
            if (data.state === 'speaking' && data.transcript) speakText(data.transcript);
          }
          if (data.interactions !== undefined) {
            quotaCount.textContent = data.interactions + "/20";
            quotaWrap.style.opacity = '1';
          }
          if (data.transcript && data.state !== 'speaking') showTranscript(data.transcript);
          if (data.message && data.role) addHistory(data.role, data.message); // Updated role assignment
        };
        ws.onclose = () => {
          wsDot.className = 'dot'; wsLabel.textContent = 'desconectado';
          quotaWrap.style.opacity = '0';
          listenMode = 'off';
          if (resetTimerInterval) clearInterval(resetTimerInterval);
          if (recognition) try { recognition.stop(); } catch (e) { }
          setTimeout(connectWS, 3000);
        };
        ws.onerror = () => { wsDot.className = 'dot error'; wsLabel.textContent = 'erro ws'; };
      } catch (err) { setTimeout(connectWS, 3000); }
    }

    connectWS();
  </script>
</body>

</html>
